<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>John Nyongesa | AI Engineer & Software Developer</title>
  <meta name="description" content="John Nyongesa – Aspiring AI Engineer & Software Developer. BCT student at JKUAT building intelligent systems, ML models, and full-stack applications." />
  <meta property="og:title" content="John Nyongesa | AI Engineer & Software Developer" />
  <meta property="og:description" content="Portfolio of John Nyongesa – BCT student at JKUAT specializing in AI and software development." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #18181f;
      --surface: #1e1e28;
      --surface2: #26263a;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent: #7c6aff;
      --accent2: #5b8af8;
      --accent3: #38d9a9;
      --text: #f0eff8;
      --text2: #a09db8;
      --text3: #6b6885;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --radius: 12px;
      --radius-lg: 20px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 99px; }

    /* Selection */
    ::selection { background: rgba(124,106,255,0.3); color: var(--text); }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      backdrop-filter: blur(20px);
      background: rgba(10,10,15,0.85);
      border-bottom: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .nav-links {
      display: flex; gap: 2rem; list-style: none;
    }

    .nav-links a {
      font-size: 0.85rem;
      color: var(--text2);
      text-decoration: none;
      font-family: var(--mono);
      letter-spacing: 0.03em;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute; bottom: -2px; left: 0; right: 0;
      height: 1px; background: var(--accent);
      transform: scaleX(0); transform-origin: right;
      transition: transform 0.3s ease;
    }

    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after { transform: scaleX(1); transform-origin: left; }

    .nav-cta {
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .nav-cta:hover { background: var(--accent); color: #fff; }

    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
    .hamburger span { width: 22px; height: 1.5px; background: var(--text2); transition: all 0.3s; }

    /* Sections */
    section { padding: 6rem 2rem; max-width: 1100px; margin: 0 auto; }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 8rem 2rem 4rem;
      max-width: 1100px; margin: 0 auto;
      position: relative;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
      width: 100%;
    }

    .hero-eyebrow {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.75rem;
    }

    .hero-eyebrow::before {
      content: '';
      display: inline-block;
      width: 30px; height: 1px;
      background: var(--accent);
    }

    .hero h1 {
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .hero h1 strong {
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-tagline {
      font-size: 1.1rem;
      color: var(--text2);
      margin: 1.5rem 0;
      font-weight: 300;
      max-width: 420px;
    }

    .hero-desc {
      font-size: 0.95rem;
      color: var(--text3);
      margin-bottom: 2.5rem;
      max-width: 400px;
      line-height: 1.8;
    }

    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }

    .btn-primary {
      padding: 0.85rem 2rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }

    .btn-primary:hover { background: #9580ff; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,106,255,0.3); }

    .btn-outline {
      padding: 0.85rem 2rem;
      border: 1px solid var(--border2);
      color: var(--text2);
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

    /* Hero visual */
    .hero-visual {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-ring {
      position: relative;
      width: 320px; height: 320px;
    }

    .avatar-ring-outer {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(124,106,255,0.2);
      animation: spin 20s linear infinite;
    }

    .avatar-ring-outer::before {
      content: '';
      position: absolute; top: -4px; left: 50%;
      width: 8px; height: 8px; margin-left: -4px;
      border-radius: 50%; background: var(--accent);
    }

    .avatar-inner {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 5rem;
    }

    .avatar-initials {
      font-family: var(--mono);
      font-size: 4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .floating-badge {
      position: absolute;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 0.6rem 1rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text2);
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    .badge-1 { top: 10px; right: -20px; color: var(--accent3); border-color: rgba(56,217,169,0.3); }
    .badge-2 { bottom: 30px; left: -30px; color: var(--accent2); border-color: rgba(91,138,248,0.3); }
    .badge-3 { top: 40%; right: -40px; color: var(--accent); border-color: rgba(124,106,255,0.3); }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    .badge-1 { animation: float 3s ease-in-out infinite; }
    .badge-2 { animation: float 3.5s ease-in-out infinite 0.5s; }
    .badge-3 { animation: float 4s ease-in-out infinite 1s; }

    /* Section headers */
    .section-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .section-title strong { font-weight: 600; }
    .section-line {
      width: 40px; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      margin-bottom: 3rem;
      border-radius: 2px;
    }

    /* About */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    .about-text p {
      color: var(--text2);
      margin-bottom: 1.2rem;
      font-size: 0.97rem;
      font-weight: 300;
      line-height: 1.9;
    }

    .about-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color 0.2s, transform 0.2s;
    }

    .stat-card:hover { border-color: var(--accent); transform: translateY(-3px); }

    .stat-num {
      font-family: var(--mono);
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label { font-size: 0.82rem; color: var(--text3); margin-top: 0.25rem; }

    .currently-card {
      margin-top: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent3);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
    }

    .currently-card h4 {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent3);
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    .currently-item {
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 0.88rem; color: var(--text2);
      margin-bottom: 0.4rem;
    }

    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent3); flex-shrink: 0; }

    /* Projects */
    .projects-bg {
      background: var(--bg2);
      padding: 6rem 0;
    }

    .projects-inner { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      transition: all 0.3s ease;
      display: flex; flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .project-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.4s ease;
    }

    .project-card:hover { border-color: var(--border2); transform: translateY(-6px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .project-card:hover::before { transform: scaleX(1); }

    .project-num {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text3);
      margin-bottom: 1.2rem;
    }

    .project-tags {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .tag {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 0.2rem 0.7rem;
      border-radius: 99px;
      border: 1px solid var(--border2);
      color: var(--text3);
    }

    .tag.ai { border-color: rgba(124,106,255,0.4); color: var(--accent); background: rgba(124,106,255,0.08); }
    .tag.ml { border-color: rgba(56,217,169,0.4); color: var(--accent3); background: rgba(56,217,169,0.08); }
    .tag.web { border-color: rgba(91,138,248,0.4); color: var(--accent2); background: rgba(91,138,248,0.08); }

    .project-title {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--text);
    }

    .project-desc {
      font-size: 0.88rem;
      color: var(--text2);
      line-height: 1.8;
      flex: 1;
      margin-bottom: 1.5rem;
      font-weight: 300;
    }

    .project-links {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
    }

    .project-link {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text3);
      text-decoration: none;
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s;
    }

    .project-link:hover { border-color: var(--accent); color: var(--accent); }

    .project-card.featured { grid-column: span 2; }
    .project-card.featured .project-title { font-size: 1.4rem; }

    /* Skills */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .skill-category {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.8rem;
      transition: all 0.2s;
    }

    .skill-category:hover { border-color: var(--border2); }

    .skill-cat-icon {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .skill-cat-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      color: var(--text);
    }

    .skill-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .skill-item {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.85rem; color: var(--text2);
    }

    .skill-bar-wrap {
      flex: 1; height: 3px;
      background: var(--surface2);
      border-radius: 99px;
      margin-left: 1rem;
      overflow: hidden;
    }

    .skill-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
    }

    /* Education / Experience */
    .timeline { display: flex; flex-direction: column; gap: 0; }

    .timeline-item {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 2rem;
      padding-bottom: 2.5rem;
      position: relative;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: 160px;
      top: 8px; bottom: 0;
      width: 1px;
      background: var(--border);
      margin-left: 1.9rem;
    }

    .timeline-item:last-child::before { display: none; }

    .timeline-date {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text3);
      padding-top: 2px;
      text-align: right;
    }

    .timeline-content {
      padding-left: 2rem;
      position: relative;
    }

    .timeline-content::before {
      content: '';
      position: absolute; left: -5px; top: 6px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg2);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.2);
    }

    .timeline-role {
      font-size: 1rem; font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .timeline-org {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .timeline-desc {
      font-size: 0.88rem;
      color: var(--text2);
      font-weight: 300;
      line-height: 1.8;
    }

    .course-chips {
      display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem;
    }

    .chip {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      background: var(--surface2);
      border-radius: 99px;
      color: var(--text2);
    }

    /* Blog section */
    .blog-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .blog-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: all 0.2s;
      cursor: default;
    }

    .blog-card:hover { border-color: var(--border2); transform: translateY(-3px); }

    .blog-week {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent3);
      margin-bottom: 0.6rem;
    }

    .blog-title { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.5rem; }

    .blog-excerpt {
      font-size: 0.83rem; color: var(--text3);
      font-weight: 300; line-height: 1.7;
    }

    .blog-cta {
      margin-top: 2rem;
      padding: 1.5rem 2rem;
      background: var(--surface);
      border: 1px dashed var(--border2);
      border-radius: var(--radius);
      text-align: center;
    }

    .blog-cta p { color: var(--text3); font-size: 0.88rem; margin-bottom: 0.5rem; }

    /* Contact */
    .contact-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    .contact-desc {
      font-size: 0.97rem;
      color: var(--text2);
      font-weight: 300;
      line-height: 1.9;
      margin-bottom: 2rem;
    }

    .contact-links { display: flex; flex-direction: column; gap: 1rem; }

    .contact-link {
      display: flex; align-items: center; gap: 1rem;
      text-decoration: none;
      color: var(--text2);
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .contact-link:hover { border-color: var(--accent); color: var(--text); transform: translateX(4px); }

    .contact-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .contact-form { display: flex; flex-direction: column; gap: 1rem; }

    .form-group label {
      display: block;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text3);
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { height: 120px; }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text3);
    }

    footer span { color: var(--accent); }

    /* Mobile nav menu */
    .mobile-menu {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,15,0.98);
      z-index: 99;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: var(--mono);
      font-size: 1.2rem;
      color: var(--text2);
      text-decoration: none;
    }
    .mobile-menu a:hover { color: var(--accent); }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-up { animation: fadeUp 0.7s ease forwards; }
    .fade-up-2 { animation: fadeUp 0.7s 0.15s ease both; }
    .fade-up-3 { animation: fadeUp 0.7s 0.3s ease both; }
    .fade-up-4 { animation: fadeUp 0.7s 0.45s ease both; }

    /* Background grid */
    .bg-grid {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .bg-glow {
      position: fixed; top: -200px; right: -200px;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,106,255,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: -1;
